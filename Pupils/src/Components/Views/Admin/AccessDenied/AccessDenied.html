<AdminLayout title="$title">

   <div class="row m-0 gy-4">
      <div class="col-12">
         <div class="card border-0 shadow-sm">
            <div class="card-body text-center py-5">
               <span class="d-inline-flex p-3 mb-3 dashboard-icon bg-danger text-white rounded-circle">
                  <Icon name="bi-shield-lock-fill" />
               </span>
               <h4 class="card-title mb-2">Insufficient permissions</h4>
               <p class="text-muted mb-4">
                  You don't have permission to view this page. If you believe this
                  is a mistake, ask an administrator to grant you access.
               </p>
               <a href="/admin" class="btn btn-primary">
                  <Icon name="bi-arrow-left" />
                  Back to dashboard
               </a>
            </div>
         </div>
      </div>
   </div>

</AdminLayout>
