<AdminLayout title="Email log">
    <div class="d-flex justify-content-between mt-2 mb-4">
        <div>
            <h3 class="text-h3">Email log</h3>
            <a class="icon-link" href="/admin/email-log">
                <Icon name="bi-arrow-left" classList="icon" />
                Back
            </a>
        </div>
    </div>
    <div if="$item" class="card shadow-sm mb-4">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9">{$item->Status}</dd>

                <dt class="col-sm-3">Type</dt>
                <dd class="col-sm-9">{$item->Type}</dd>

                <dt class="col-sm-3">Recipient</dt>
                <dd class="col-sm-9">{$item->Recipient}<span if="$item->RecipientName"> ({$item->RecipientName})</span>
                </dd>

                <dt class="col-sm-3">Subject</dt>
                <dd class="col-sm-9">{$item->Subject}</dd>

                <dt class="col-sm-3">Created</dt>
                <dd class="col-sm-9">{formatTime($item->CreatedOn)}</dd>

                <dt class="col-sm-3">Sent</dt>
                <dd class="col-sm-9">{formatTime($item->SentOn)}</dd>

                <dt if="$item->Error" class="col-sm-3 text-danger">Error</dt>
                <dd if="$item->Error" class="col-sm-9 text-danger">{$item->Error}</dd>
            </dl>
        </div>
    </div>
    <div if="$item" class="card shadow-sm">
        <div class="card-header">Body preview</div>
        <div class="card-body">
            <iframe src="/api/admin/email-log/{$id}/body" width="100%" height="700px" class="border-0"></iframe>
        </div>
    </div>
</AdminLayout>
